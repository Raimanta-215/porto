<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Detail</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-dark">
    <div id="canvas-container"></div>
    <main class="content-wrapper">
        <button id="back-btn" class="brutalist-btn">
            <i data-lucide="arrow-left"></i> ./RETURN_TO_DASHBOARD
        </button>

        <div id="main-card" class="terminal-card">
            <div class="status-bar">
                <div class="brand">
                    <i data-lucide="terminal" class="text-emerald"></i>
                    <span id="title" class="title-text">LOADING...</span>
                </div>
                <span id="status" class="status-text">STATUS: --</span>
            </div>
            </div>
    </main>
    <script type="module" src="main.js"></script>
</body>
</html>
