<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Chambre Rétro 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }

        /* --- STYLE DE L'ÉCRAN DE CHARGEMENT --- */
        #loading-screen {
            position: absolute;
            z-index: 10; /* Le place au-dessus du canvas 3D */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace; /* Petite touche rétro pour la police */
            font-size: 24px;
            transition: opacity 0.5s ease; /* Prépare un fondu en douceur */
        }
    </style>
    <link rel="icon" href="data:,">
</head>
<body>

    <div id="loading-screen">CHARGEMENT EN COURS...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="src/main.js"></script>
</body>
</html>
